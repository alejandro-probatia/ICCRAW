name: Build rawpy-demosaic Windows wheel

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: "CPython version for the Windows wheel"
        required: true
        default: "3.12"
      rawpy-demosaic-ref:
        description: "rawpy-demosaic git ref"
        required: true
        default: "8b17075"

jobs:
  windows-wheel:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout ICCRAW
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          architecture: x64

      - name: Clone rawpy-demosaic
        shell: pwsh
        run: |
          git config --global url."https://github.com/".insteadOf git://github.com/
          git clone --recursive https://github.com/exfab/rawpy-demosaic.git tmp/rawpy-demosaic
          git -C tmp/rawpy-demosaic checkout "${{ inputs['rawpy-demosaic-ref'] }}"
          git -C tmp/rawpy-demosaic submodule sync --recursive
          git -C tmp/rawpy-demosaic submodule update --init --recursive
          New-Item -ItemType Directory -Force -Path tmp/rawpy-demosaic-build-info | Out-Null
          git -C tmp/rawpy-demosaic rev-parse HEAD | Out-File -Encoding ascii tmp/rawpy-demosaic-build-info/source-commit.txt
          git -C tmp/rawpy-demosaic submodule status | Out-File -Encoding ascii tmp/rawpy-demosaic-build-info/submodules.txt

      - name: Patch GPL3 legacy build
        shell: pwsh
        working-directory: tmp/rawpy-demosaic
        run: |
          $setup = Get-Content -LiteralPath setup.py -Raw
          $setup = $setup.Replace("buildGPLCode = False", "buildGPLCode = True")
          $setup = $setup.Replace("name = 'rawpy'", "name = 'rawpy-demosaic'")
          $setup = $setup.Replace("License :: OSI Approved :: MIT License", "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)")
          $setup = $setup.Replace("url = 'https://github.com/letmaik/rawpy'", "url = 'https://github.com/exfab/rawpy-demosaic'")
          $setup = $setup.Replace("-DENABLE_EXAMPLES=OFF -DENABLE_OPENMP=ON -DENABLE_RAWSPEED=OFF", "-DENABLE_EXAMPLES=OFF -DENABLE_OPENMP=OFF -DENABLE_RAWSPEED=OFF")
          $setup = $setup.Replace("        if not hasOpenMpSupport:`r`n            raise Exception('OpenMP not available but should be, see error messages above')`r`n        if is64Bit:", "        if not hasOpenMpSupport:`r`n            omp = []`r`n        elif is64Bit:")
          $setup = $setup.Replace("        if not hasOpenMpSupport:`n            raise Exception('OpenMP not available but should be, see error messages above')`n        if is64Bit:", "        if not hasOpenMpSupport:`n            omp = []`n        elif is64Bit:")
          Set-Content -LiteralPath setup.py -Value $setup -Encoding utf8

      - name: Build wheel
        shell: pwsh
        working-directory: tmp/rawpy-demosaic
        run: |
          $vsDevCmd = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            $vsDevCmd = "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat"
          }
          if (-not (Test-Path $vsDevCmd)) {
            throw "No Visual Studio developer command prompt found"
          }
          & "${env:COMSPEC}" /s /c "`"$vsDevCmd`" -arch=x64 -no_logo && set" | ForEach-Object {
            $name, $value = $_ -split '=', 2
            try {
              Set-Content env:\"$name" $value
            } catch {
            }
          }
          python -m pip install --upgrade pip "setuptools<70" wheel "numpy==2.4.4" "Cython<3"
          python -u setup.py bdist_wheel

      - name: Smoke AMaZE support
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -LiteralPath tmp\rawpy-demosaic\dist -Filter "rawpy_demosaic-*.whl" | Select-Object -First 1
          if (-not $wheel) {
            throw "No rawpy-demosaic wheel was produced"
          }
          python -m venv tmp\amaze-smoke
          .\tmp\amaze-smoke\Scripts\python.exe -m pip install --upgrade pip
          .\tmp\amaze-smoke\Scripts\python.exe -m pip install $wheel.FullName
          @'
          import json
          import rawpy

          payload = {
              "rawpy": getattr(rawpy, "__version__", "unknown"),
              "libraw": getattr(rawpy, "libraw_version", None),
              "flags": getattr(rawpy, "flags", {}),
              "amaze_supported": bool(getattr(rawpy, "flags", {}).get("DEMOSAIC_PACK_GPL3", False)),
          }
          print(json.dumps(payload, indent=2, default=str))
          assert payload["amaze_supported"], payload
          '@ | .\tmp\amaze-smoke\Scripts\python.exe -

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawpy-demosaic-${{ inputs.python-version }}-win-amd64
          path: |
            tmp/rawpy-demosaic/dist/*.whl
            tmp/rawpy-demosaic-build-info/*.txt
          if-no-files-found: error
