# Recipe científica de ejemplo para perfilado
# Mantener sin operaciones creativas.
raw_developer: dcraw
demosaic_algorithm: rcd
black_level_mode:
  mode: metadata
white_balance_mode: fixed
wb_multipliers: [1.0, 1.0, 1.0, 1.0]
exposure_compensation: 0.0
tone_curve:
  mode: linear
output_linear: true
denoise: "off"
sharpen: "off"
input_color_assumption: camera_native
working_space: scene_linear_camera_rgb
output_space: scene_linear_camera_rgb
chart_reference: colorchecker24_reference
illuminant_metadata: D50_led_rig_session_2026_04
sampling_strategy:
  mode: trimmed_mean
  trim_percent: 0.1
  reject_saturated: true
profiling_mode: true
profile_engine: argyll
