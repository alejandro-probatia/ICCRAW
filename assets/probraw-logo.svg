<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ProbRAW</title>
  <desc id="desc">Vector logo for ProbRAW, a scientific RAW profiling workflow led by Probatia Forensics SL with AEICF collaboration.</desc>
  <defs>
