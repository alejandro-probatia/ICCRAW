<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ProbRAW</title>
  <desc id="desc">Vector logo for the ProbRAW scientific RAW workflow application.</desc>
  <defs>
    <linearGradient id="navyGradient" x1="20" y1="52" x2="258" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07335f"/>
      <stop offset="1" stop-color="#021c42"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="210" y1="62" x2="294" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18bfd1"/>
      <stop offset="1" stop-color="#07919d"/>
    </linearGradient>
    <linearGradient id="rawGradient" x1="802" y1="120" x2="1160" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12b8c9"/>
      <stop offset="1" stop-color="#078d9a"/>
    </linearGradient>
    <style>
      .navy-fill { fill: url(#navyGradient); }
      .navy-stroke { stroke: url(#navyGradient); }
      .teal-stroke { stroke: url(#tealGradient); }
      .teal-fill { fill: url(#tealGradient); }
      .wordmark-navy { fill: #052653; }
      .wordmark-raw { fill: url(#rawGradient); }
    </style>
  </defs>

  <g transform="translate(28 28)">
    <path class="navy-stroke" d="M 27 199 V 88 L 141 22 L 218 66" fill="none" stroke-width="28" stroke-linecap="square" stroke-linejoin="miter"/>
    <path class="teal-stroke" d="M 244 99 L 274 118 V 245 L 158 312 L 73 263" fill="none" stroke-width="28" stroke-linecap="square" stroke-linejoin="miter"/>

    <path class="navy-fill" d="M 69 121 H 110 L 190 199 V 121 H 233 V 245 H 194 L 112 166 V 245 H 69 Z"/>

    <path class="teal-stroke" d="M 203 132 L 247 78" fill="none" stroke-width="19" stroke-linecap="square"/>
    <circle cx="253" cy="69" r="25" fill="#ffffff" class="teal-stroke" stroke-width="15"/>

    <path class="navy-stroke" d="M 70 252 L 37 286" fill="none" stroke-width="14" stroke-linecap="round"/>
    <circle cx="31" cy="292" r="23" fill="#ffffff" class="navy-stroke" stroke-width="12"/>
  </g>

  <text x="382" y="220" class="wordmark-navy" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="142" font-weight="300" letter-spacing="0">Nexo</text>
  <text x="794" y="220" class="wordmark-raw" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="142" font-weight="800" letter-spacing="0">RAW</text>
</svg>
