      <stop offset="0" stop-color="#163451"/>
      <stop offset="0.58" stop-color="#0d1e32"/>
      <stop offset="1" stop-color="#07101b"/>
    </linearGradient>
    <linearGradient id="foldGradient" x1="310" y1="64" x2="420" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19c7d4"/>
